<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inkline Journal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Manrope:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="site-header">
      <h1>Inkline Journal</h1>
      <p>Create, edit, and delete blog posts instantly.</p>
    </header>

    <main class="layout">
      <section class="editor">
        <h2 id="form-heading">Create Post</h2>
        <p class="helper">Posts are kept in-memory for this page session.</p>
        <div id="form-error" class="alert hidden" role="alert"></div>

        <form id="post-form">
          <input type="hidden" id="post-id" />

          <label for="title">Title</label>
          <input id="title" name="title" maxlength="120" required />

          <label for="author">Author (optional)</label>
          <input id="author" name="author" maxlength="80" />

          <label for="content">Content</label>
          <textarea id="content" name="content" rows="8" required></textarea>

          <div class="form-actions">
            <button type="submit" class="btn primary" id="submit-button">Publish Post</button>
            <button type="button" class="btn soft hidden" id="cancel-edit">Cancel Edit</button>
          </div>
        </form>
      </section>

      <section class="feed">
        <h2>Your Posts</h2>
        <div id="posts-empty" class="empty-state">No posts yet. Create your first one.</div>
        <div id="posts-list" class="post-list"></div>
      </section>
    </main>

    <template id="post-template">
      <article class="post-card">
        <h3 class="post-title"></h3>
        <p class="meta"></p>
        <p class="post-content"></p>
        <div class="card-actions">
          <button type="button" class="btn soft action-edit">Edit</button>
          <button type="button" class="btn danger action-delete">Delete</button>
        </div>
      </article>
    </template>

    <script src="./app.js"></script>
  </body>
</html>
